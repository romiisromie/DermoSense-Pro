<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DermoSense Pro — Медицинский Мониторинг</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Orbitron:wght@400;500;700;900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #020814;
    --bg-surface: #0A0F1A;
    --bg-card: rgba(255,255,255,0.04);
    --bg-card-hover: rgba(255,255,255,0.07);
    --cyan: #00E5FF;
    --cyan-dim: rgba(0,229,255,0.15);
    --cyan-glow: rgba(0,229,255,0.4);
    --red: #FF3366;
    --red-dim: rgba(255,51,102,0.15);
    --red-glow: rgba(255,51,102,0.5);
    --yellow: #FFB800;
    --yellow-dim: rgba(255,184,0,0.15);
    --green: #00E676;
    --green-dim: rgba(0,230,118,0.15);
    --text-primary: #E8F4FF;
    --text-secondary: rgba(232,244,255,0.5);
    --text-muted: rgba(232,244,255,0.25);
    --border: rgba(255,255,255,0.08);
    --border-cyan: rgba(0,229,255,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid effect */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: -50%;
    left: -20%;
    width: 60%;
    height: 80%;
    background: radial-gradient(ellipse, rgba(0,229,255,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .app-container { position: relative; z-index: 1; }

  /* ====================== HEADER ====================== */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(20px);
    background: rgba(10,15,26,0.8);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--cyan), #0080FF);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    box-shadow: 0 0 20px var(--cyan-glow);
  }

  .logo-text {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 2px;
    color: var(--cyan);
    text-shadow: 0 0 20px var(--cyan-glow);
  }

  .logo-sub {
    font-size: 10px;
    color: var(--text-secondary);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .header-center {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-secondary);
  }

  .live-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse-dot 2s infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .view-toggle {
    display: flex;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 3px;
    gap: 2px;
  }

  .toggle-btn {
    padding: 7px 16px;
    border: none;
    border-radius: 8px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    letter-spacing: 0.5px;
  }

  .toggle-btn.active {
    background: var(--cyan);
    color: var(--bg-deep);
    box-shadow: 0 0 15px var(--cyan-glow);
  }

  .toggle-btn.inactive {
    background: transparent;
    color: var(--text-secondary);
  }

  .toggle-btn.inactive:hover {
    color: var(--text-primary);
    background: rgba(255,255,255,0.05);
  }

  /* ====================== DOCTOR VIEW ====================== */
  .doctor-view { display: block; }
  .patient-view { display: none; }

  .doctor-layout {
    display: grid;
    grid-template-columns: 340px 1fr;
    grid-template-rows: auto 1fr;
    min-height: calc(100vh - 69px);
  }

  /* Alerts bar */
  .alerts-bar {
    grid-column: 1 / -1;
    padding: 10px 28px;
    background: linear-gradient(90deg, rgba(255,51,102,0.1), transparent 60%);
    border-bottom: 1px solid rgba(255,51,102,0.2);
    display: flex;
    align-items: center;
    gap: 20px;
    overflow: hidden;
  }

  .alerts-label {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--red);
    text-transform: uppercase;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .alert-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 14px;
    background: var(--red-dim);
    border: 1px solid rgba(255,51,102,0.3);
    border-radius: 20px;
    font-size: 12px;
    white-space: nowrap;
    animation: blink-border 2s infinite;
  }

  @keyframes blink-border {
    0%, 100% { border-color: rgba(255,51,102,0.3); box-shadow: none; }
    50% { border-color: rgba(255,51,102,0.8); box-shadow: 0 0 10px rgba(255,51,102,0.3); }
  }

  /* Patient sidebar */
  .sidebar {
    border-right: 1px solid var(--border);
    padding: 20px 16px;
    overflow-y: auto;
    background: rgba(0,0,0,0.2);
  }

  .sidebar-title {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 14px;
    padding-left: 4px;
  }

  .patient-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(10px);
  }

  .patient-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
  }

  .patient-card.critical::before { background: var(--red); }
  .patient-card.warning::before { background: var(--yellow); }
  .patient-card.stable::before { background: var(--green); }

  .patient-card.critical {
    border-color: rgba(255,51,102,0.3);
    animation: card-pulse 2s infinite;
  }

  @keyframes card-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,51,102,0); }
    50% { box-shadow: 0 0 0 4px rgba(255,51,102,0.1), inset 0 0 20px rgba(255,51,102,0.05); }
  }

  .patient-card.active {
    background: var(--bg-card-hover);
    border-color: var(--border-cyan);
    box-shadow: 0 0 20px rgba(0,229,255,0.1);
  }

  .patient-card:hover:not(.critical) {
    background: var(--bg-card-hover);
    border-color: rgba(255,255,255,0.15);
  }

  .patient-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .patient-info { display: flex; align-items: center; gap: 10px; }

  .status-avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
    flex-shrink: 0;
    position: relative;
  }

  .status-avatar.critical {
    background: var(--red-dim);
    border: 2px solid var(--red);
    color: var(--red);
    animation: avatar-pulse 1.5s infinite;
  }

  @keyframes avatar-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,51,102,0); }
    50% { box-shadow: 0 0 0 6px rgba(255,51,102,0.2); }
  }

  .status-avatar.warning {
    background: var(--yellow-dim);
    border: 2px solid var(--yellow);
    color: var(--yellow);
  }

  .status-avatar.stable {
    background: var(--green-dim);
    border: 2px solid var(--green);
    color: var(--green);
  }

  .patient-name {
    font-weight: 600;
    font-size: 14px;
    color: var(--text-primary);
  }

  .patient-age {
    font-size: 11px;
    color: var(--text-secondary);
  }

  .sos-badge {
    background: var(--red);
    color: white;
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 3px 8px;
    border-radius: 4px;
    animation: blink 1s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .patient-vitals {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }

  .vital-mini {
    background: rgba(0,0,0,0.3);
    border-radius: 8px;
    padding: 6px 8px;
    text-align: center;
  }

  .vital-mini-label {
    font-size: 9px;
    color: var(--text-muted);
    margin-bottom: 2px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .vital-mini-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
  }

  .vital-mini-value.ok { color: var(--cyan); }
  .vital-mini-value.warn { color: var(--yellow); }
  .vital-mini-value.crit { color: var(--red); }

  .battery-row {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 4px;
    margin-top: 8px;
  }

  .battery-icon {
    font-size: 11px;
    color: var(--text-muted);
  }

  .battery-bar {
    width: 28px;
    height: 8px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 2px;
    position: relative;
    overflow: hidden;
  }

  .battery-bar::after {
    content: '';
    position: absolute;
    right: -3px;
    top: 50%;
    transform: translateY(-50%);
    width: 2px;
    height: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 0 1px 1px 0;
  }

  .battery-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s;
  }

  .battery-fill.high { background: var(--green); }
  .battery-fill.medium { background: var(--yellow); }
  .battery-fill.low { background: var(--red); }

  .battery-pct {
    font-size: 10px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }

  /* ====================== DETAIL PANEL ====================== */
  .detail-panel {
    padding: 24px 28px;
    overflow-y: auto;
  }

  .detail-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .detail-patient-name {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .detail-subtitle {
    font-size: 13px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .status-pill {
    padding: 3px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .status-pill.critical { background: var(--red-dim); color: var(--red); border: 1px solid rgba(255,51,102,0.4); }
  .status-pill.warning { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(255,184,0,0.4); }
  .status-pill.stable { background: var(--green-dim); color: var(--green); border: 1px solid rgba(0,230,118,0.4); }

  .vitals-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }

  .vital-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    backdrop-filter: blur(10px);
    transition: all 0.3s;
  }

  .vital-card:hover { border-color: rgba(0,229,255,0.2); }

  .vital-card.critical-card {
    border-color: rgba(255,51,102,0.3);
    background: linear-gradient(135deg, rgba(255,51,102,0.08), rgba(255,51,102,0.02));
    animation: blink-border 2s infinite;
  }

  .vital-icon {
    font-size: 22px;
    margin-bottom: 8px;
    display: block;
  }

  .vital-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .vital-value {
    font-family: 'Orbitron', monospace;
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 2px;
  }

  .vital-value.ok { color: var(--cyan); text-shadow: 0 0 20px var(--cyan-glow); }
  .vital-value.warn { color: var(--yellow); text-shadow: 0 0 20px rgba(255,184,0,0.4); }
  .vital-value.crit { color: var(--red); text-shadow: 0 0 20px var(--red-glow); }

  .vital-unit {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }

  /* Chart area */
  .chart-container {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    backdrop-filter: blur(10px);
  }

  .chart-title {
    font-size: 12px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .chart-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  canvas.vital-chart {
    width: 100% !important;
    height: 100px !important;
  }

  /* AI Prognosis */
  .ai-card {
    background: linear-gradient(135deg, rgba(255,51,102,0.1), rgba(255,51,102,0.03));
    border: 1px solid rgba(255,51,102,0.35);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 20px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    backdrop-filter: blur(10px);
  }

  .ai-icon {
    width: 42px;
    height: 42px;
    border-radius: 10px;
    background: rgba(255,51,102,0.15);
    border: 1px solid rgba(255,51,102,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .ai-title {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--red);
    margin-bottom: 6px;
  }

  .ai-text {
    font-size: 13px;
    color: var(--text-primary);
    line-height: 1.6;
  }

  .ai-temp-highlight {
    color: var(--red);
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
  }

  .ai-card-stable {
    background: linear-gradient(135deg, rgba(0,229,255,0.07), rgba(0,229,255,0.02));
    border: 1px solid rgba(0,229,255,0.2);
  }

  .ai-card-stable .ai-title { color: var(--cyan); }
  .ai-card-stable .ai-icon {
    background: rgba(0,229,255,0.1);
    border-color: rgba(0,229,255,0.25);
  }

  /* ====================== PATIENT/FAMILY VIEW ====================== */
  .patient-view {
    min-height: calc(100vh - 69px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }

  .pv-card {
    max-width: 420px;
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 40px 32px;
    text-align: center;
    backdrop-filter: blur(20px);
    position: relative;
    overflow: hidden;
  }

  .pv-card.critical-bg {
    border-color: rgba(255,51,102,0.4);
    background: rgba(255,51,102,0.06);
    animation: card-pulse 2s infinite;
  }

  .pv-card.stable-bg {
    border-color: rgba(0,230,118,0.3);
    background: rgba(0,230,118,0.04);
  }

  .pv-patient-label {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .pv-patient-name {
    font-family: 'Orbitron', monospace;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 30px;
  }

  .pv-status-icon {
    font-size: 72px;
    display: block;
    margin-bottom: 16px;
    filter: drop-shadow(0 0 30px currentColor);
  }

  .pv-status-text {
    font-family: 'Orbitron', monospace;
    font-size: 32px;
    font-weight: 900;
    letter-spacing: 3px;
    margin-bottom: 12px;
  }

  .pv-status-text.ok { color: var(--green); text-shadow: 0 0 30px rgba(0,230,118,0.5); }
  .pv-status-text.crit {
    color: var(--red);
    text-shadow: 0 0 30px rgba(255,51,102,0.7);
    animation: blink 1s infinite;
  }

  .pv-status-desc {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 30px;
    line-height: 1.6;
  }

  .pv-vitals-row {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 30px;
  }

  .pv-vital {
    text-align: center;
  }

  .pv-vital-icon { font-size: 20px; margin-bottom: 4px; display: block; }

  .pv-vital-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    color: var(--cyan);
    display: block;
  }

  .pv-vital-val.crit { color: var(--red); }
  .pv-vital-lbl { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

  .pv-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 14px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 0.5px;
  }

  .pv-btn.check {
    background: rgba(0,229,255,0.12);
    border: 1px solid rgba(0,229,255,0.3);
    color: var(--cyan);
    margin-bottom: 10px;
  }

  .pv-btn.check:hover {
    background: rgba(0,229,255,0.2);
    box-shadow: 0 0 20px rgba(0,229,255,0.2);
  }

  .pv-btn.sos {
    background: var(--red);
    color: white;
    box-shadow: 0 4px 20px rgba(255,51,102,0.4);
  }

  .pv-btn.sos:hover {
    box-shadow: 0 6px 30px rgba(255,51,102,0.6);
    transform: translateY(-1px);
  }

  /* Phone notification mockup */
  .phone-notif {
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,51,102,0.4);
    border-radius: 16px;
    padding: 14px 16px;
    margin-bottom: 20px;
    text-align: left;
    display: none;
  }

  .phone-notif.visible { display: block; animation: slide-in 0.4s ease; }

  @keyframes slide-in {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .notif-header {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .notif-app-icon {
    width: 18px;
    height: 18px;
    background: var(--red);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
  }

  .notif-title { font-weight: 600; color: var(--red); font-size: 13px; margin-bottom: 3px; }
  .notif-body { font-size: 12px; color: var(--text-secondary); line-height: 1.4; }

  .check-result {
    background: rgba(0,229,255,0.08);
    border: 1px solid rgba(0,229,255,0.2);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 14px;
    font-size: 13px;
    color: var(--cyan);
    display: none;
    text-align: left;
  }

  .check-result.visible { display: block; animation: slide-in 0.3s ease; }

  /* Patient selector for family view */
  .pv-selector {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .pv-sel-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Space Grotesk', sans-serif;
  }

  /* Timestamp */

    font-family: 'JetBrains Mono', monospace;

  .section-header {

<body>

<script>

let activePatientId = 1;

// ====================== CLOCK ======================
function updateClock() {
  const now = new Date();

setInterval(updateClock, 1000);
updateClock();

// ====================== VIEW SWITCH ======================
function switchView(view) {
  const dv = document.getElementById('doctorView');
  const pv = document.getElementById('patientView');
  const bd = document.getElementById('btnDoctor');
  const bp = document.getElementById('btnPatient');

  if (view === 'doctor') {

    pv.style.display = 'flex';

    bp.className = 'toggle-btn active';
    renderPatientView();

}

// ====================== PATIENT CARDS ======================
function statusColor(s) {
  return s === 'critical' ? 'crit' : s === 'warning' ? 'warn' : 'ok';
}

function batteryClass(pct) {
  return pct > 60 ? 'high' : pct > 30 ? 'medium' : 'low';
}

function renderPatientList() {
  const container = document.getElementById('patientList');
  container.innerHTML = patients.map(p => `
    <div class="patient-card ${p.status}${p.id === activePatientId ? ' active' : ''}" onclick="selectPatient(${p.id})">

            <div class="patient-name">${p.name}</div>

      </div>
      <div class="patient-vitals">

        </div>
        <div class="vital-mini">

          <div class="vital-mini-value ${p.temp >= 37.5 ? 'crit' : p.temp >= 37.0 ? 'warn' : 'ok'}">${p.temp}°</div>
        </div>
      </div>
      <div class="battery-row">
        <span class="battery-icon">🔋</span>
        <div class="battery-bar"><div class="battery-fill ${batteryClass(p.battery)}" style="width:${p.battery}%"></div></div>
        <span class="battery-pct">${p.battery}%</span>
        <span class="timestamp" style="margin-left:8px">${p.lastUpdate}</span>
      </div>
    </div>
  `).join('');
}

// ====================== SPARKLINE ======================
function buildSparkline(data, color) {
  const min = Math.min(...data);
  const max = Math.max(...data);
  const range = max - min || 1;
  const w = 300; const h = 60;
  const pts = data.map((v, i) => {
    const x = (i / (data.length - 1)) * w;
    const y = h - ((v - min) / range) * (h - 8) - 4;
    return `${x},${y}`;
  });
  const polyline = pts.join(' ');
  // area
  const areaPoints = `0,${h} ${polyline} ${w},${h}`;
  return `<svg viewBox="0 0 300 60" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="grad${color.replace('#','')}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <polygon points="${areaPoints}" fill="url(#grad${color.replace('#','')})"/>
    <polyline points="${polyline}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}

// ====================== DETAIL PANEL ======================
function renderDetailPanel(p) {

  document.getElementById('detailPanel').innerHTML = `
    <div class="detail-header">
      <div>
        <div class="detail-patient-name" style="color: ${p.status === 'critical' ? 'var(--red)' : p.status === 'warning' ? 'var(--yellow)' : 'var(--cyan)'}">${p.name}</div>

          ${p.age} лет &nbsp;·&nbsp; ${p.location} &nbsp;·&nbsp; ${p.device}
          <span class="status-pill ${p.status}">${p.status === 'critical' ? 'Критическое' : p.status === 'warning' ? 'Внимание' : 'Стабильно'}</span>
        </div>
      </div>
      <div class="timestamp">${p.lastUpdate}</div>
    </div>

    <!-- AI Prognosis -->
    <div class="ai-card${aiCardClass}">
      <div class="ai-icon">${aiEmoji}</div>
      <div>
        <div class="ai-title">AI АНАЛИЗ · DERMOSENSE</div>
        <div class="ai-text">${p.aiType === 'critical'
          ? `Прогноз: через 1.5 часа температура поднимется до <span class="ai-temp-highlight">38.2°C</span> — рекомендуется принять жаропонижающее. Зафиксировано падение, низкий SpO₂.`

      </div>
    </div>

    <!-- Vitals grid -->
    <div class="section-header">Текущие показатели</div>
    <div class="vitals-grid">
      <div class="vital-card ${p.spo2 < 90 ? 'critical-card' : ''}">
        <span class="vital-icon">💧</span>
        <div class="vital-label">SpO₂</div>
        <div class="vital-value ${p.spo2 < 90 ? 'crit' : p.spo2 < 95 ? 'warn' : 'ok'}">${p.spo2}<span class="vital-unit">%</span></div>

      </div>
      <div class="vital-card">
        <span class="vital-icon">❤️</span>
        <div class="vital-label">Пульс</div>
        <div class="vital-value ${p.pulse > 100 ? 'warn' : 'ok'}">${p.pulse}<span class="vital-unit"> уд/мин</span></div>
        <div class="sparkline-wrap">${buildSparkline(p.pulseHistory, pulseColor)}</div>
      </div>
      <div class="vital-card ${p.temp >= 37.5 ? 'critical-card' : ''}">
        <span class="vital-icon">🌡️</span>
        <div class="vital-label">Температура</div>
        <div class="vital-value ${p.temp >= 37.5 ? 'crit' : p.temp >= 37.0 ? 'warn' : 'ok'}">${p.temp}<span class="vital-unit">°C</span></div>
        <div class="sparkline-wrap">${buildSparkline(p.tempHistory, tempColor)}</div>
      </div>
      <div class="vital-card">
        <span class="vital-icon">🧠</span>
        <div class="vital-label">Стресс</div>
        <div class="vital-value ${p.stress > 70 ? 'crit' : p.stress > 50 ? 'warn' : 'ok'}">${p.stress}<span class="vital-unit">%</span></div>
      </div>
    </div>

}

function selectPatient(id) {
  activePatientId = id;

// ====================== PATIENT VIEW ======================
function renderPatientView() {
  // Selector
  document.getElementById('pvSelector').innerHTML = patients.map(p => `
    <button class="pv-sel-btn ${p.id === pvPatientId ? 'active' : ''}" onclick="selectPvPatient(${p.id})">${p.name}</button>

  const p = patients.find(pt => pt.id === pvPatientId);
  const isCrit = p.status === 'critical';
  const isWarn = p.status === 'warning';
  const card = document.getElementById('pvCard');

  card.className = `pv-card ${isCrit ? 'critical-bg' : 'stable-bg'}`;

  card.innerHTML = `
    <div class="pv-patient-label">Пациент под наблюдением</div>
    <div class="pv-patient-name" style="color:${isCrit ? 'var(--red)' : isWarn ? 'var(--yellow)' : 'var(--cyan)'}">${p.name}, ${p.age} лет</div>

    <div class="pv-status-text ${isCrit ? 'crit' : 'ok'}">${isCrit ? 'ТРЕВОГА' : isWarn ? 'ВНИМАНИЕ' : 'ВСЁ ХОРОШО'}</div>

      : 'Пластырь работает нормально. Все показатели в норме. Нет поводов для беспокойства.'}</div>

    <div class="pv-vitals-row">
      <div class="pv-vital">
        <span class="pv-vital-icon">❤️</span>
        <span class="pv-vital-val ${p.pulse > 100 ? 'warn' : ''}">${p.pulse}</span>
        <span class="pv-vital-lbl">уд/мин</span>
      </div>
      <div class="pv-vital">
        <span class="pv-vital-icon">💧</span>
        <span class="pv-vital-val ${p.spo2 < 90 ? 'crit' : ''}">${p.spo2}%</span>
        <span class="pv-vital-lbl">SpO₂</span>
      </div>
      <div class="pv-vital">
        <span class="pv-vital-icon">🌡️</span>
        <span class="pv-vital-val">${p.temp}°C</span>
        <span class="pv-vital-lbl">Темп.</span>
      </div>
    </div>

    <div class="check-result" id="checkResult"></div>

    <button class="pv-btn check" onclick="checkPatch()">🔍 Проверить пластырь</button>
    ${isCrit ? `<button class="pv-btn sos" onclick="callSOS()">📞 Вызвать скорую — 103</button>` : ''}
  `;
}

function selectPvPatient(id) {
  pvPatientId = id;
  renderPatientView();
}

function checkPatch() {
  const p = patients.find(pt => pt.id === pvPatientId);
  const result = document.getElementById('checkResult');
  result.className = 'check-result visible';
  result.innerHTML = `
    ✅ Пластырь подключён · Сигнал: отличный<br>
    📡 Последняя синхронизация: ${p.lastUpdate}<br>
    🔋 Заряд: ${p.battery}% ${p.battery < 30 ? '⚠️ Требуется зарядка' : ''}<br>
    📍 Устройство: ${p.device}
  `;
}

function callSOS() {
  alert('⚠️ В реальном приложении здесь будет вызов экстренной помощи по номеру 103');
}
